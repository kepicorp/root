services:
  root:
    image: docker.kepi.site/root-game:latest
    pull_policy: always
    container_name: root-game
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - root-data:/app/data/rooms
    environment:
      PORT: 8787
      DATA_DIR: /app/data/rooms
      MAX_ROOM_AGE_DAYS: 90
    # Admin password and other secrets: put them in a .env file next to this
    # file (never commit that file). Example .env contents:
    #   ADMIN_PASSWORD=mysecret
    # docker compose loads .env automatically; env_file below injects the
    # variables directly into the container so no shell interpolation needed.
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  root-data:
